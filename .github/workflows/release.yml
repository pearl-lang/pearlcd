name: Release

on:
  release:
    types: [published]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake bison flex
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j$(nproc) --config Release
      - name: Package linux binary
        run: |
          mkdir -p dist
          tar -czf dist/pearlcd-linux.tar.gz -C build pearlcd
          sha256sum dist/pearlcd-linux.tar.gz | awk '{print $1}' > dist/pearlcd-linux.tar.gz.sha256
          ls -l dist
      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pearlcd-linux
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2 and toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
      - name: Refresh MSYS2 package databases
        shell: msys2 {0}
        run: pacman -Syy --noconfirm
      - name: Install Windows dependencies
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-make \
            mingw-w64-x86_64-cmake \
            bison \
            flex
      - name: Configure (MinGW)
        shell: msys2 {0}
        run: cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_MAKE_PROGRAM=mingw32-make
      - name: Build (MinGW)
        shell: msys2 {0}
        run: cmake --build build -- -j2
      - name: Package windows binary
        shell: msys2 {0}
        run: |
          mkdir -p dist
          zip -j dist/pearlcd-windows.zip build/pearlcd.exe
          powershell -Command "Get-FileHash dist/pearlcd-windows.zip -Algorithm SHA256 | ForEach-Object { \$_.Hash }" > dist/pearlcd-windows.zip.sha256
      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pearlcd-windows
          path: dist/

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: pearlcd-linux
          path: dist
      - name: Download windows binary
        uses: actions/download-artifact@v4
        with:
          name: pearlcd-windows
          path: dist
      - name: Create Release and upload assets
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'dist/*'
          token: ${{ secrets.GITHUB_TOKEN }}
