name: Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake bison flex

      - name: Build and package linux binary
        run: bash scripts/package_release.sh linux dist

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pearlcd-linux
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 and toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64

      - name: Refresh MSYS2 package databases
        shell: msys2 {0}
        run: pacman -Syy --noconfirm

      - name: Install Windows dependencies
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-make \
            mingw-w64-x86_64-cmake \
            bison \
            flex

      - name: Build and package windows binary
        shell: msys2 {0}
        run: bash scripts/package_release.sh mingw dist

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pearlcd-windows
          path: dist/

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: pearlcd-linux
          path: dist

      - name: Download windows binary
        uses: actions/download-artifact@v4
        with:
          name: pearlcd-windows
          path: dist

      - name: Install pandoc (for docs)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc || true

      - name: Build documentation (HTML + PDF attempt)
        run: |
          bash scripts/docs.sh all dist/docs || echo "Docs build had warnings but continuing"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/docs/tr/book/pearlcd-tr-book.pdf
            dist/docs/en/book/pearlcd-en-book.pdf
            dist/*
          fail_on_unmatched_files: true
