name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake bison flex

      - name: Prepare dependencies (Windows via MSYS2)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64

      - name: Refresh MSYS2 package databases
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: pacman -Syy --noconfirm

      - name: Install Windows dependencies
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-make \
            mingw-w64-x86_64-cmake \
            bison \
            flex

      - name: Verify Bison Installation
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          bison --version

      - name: Configure
        if: matrix.os == 'ubuntu-latest'
        run: cmake -S . -B build

      - name: Configure (Windows, MinGW)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_MAKE_PROGRAM=mingw32-make

      - name: Build
        if: matrix.os == 'ubuntu-latest'
        run: cmake --build build -j$(nproc)

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cmake --build build -- -j2

      - name: Run parser + lower smoke tests
        shell: msys2 {0}
        run: |
          echo "Running parse/lower/run smoke tests"
          ./build/pearlcd --parse examples/test.prl
          ./build/pearlcd --lower examples/test.prl
          ./build/pearlcd --run examples/test.prl
