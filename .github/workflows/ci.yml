name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake bison flex
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run parser + lower smoke tests
        run: |
          ./build/pearlcd --parse examples/test.prl
          ./build/pearlcd --lower examples/test.prl
